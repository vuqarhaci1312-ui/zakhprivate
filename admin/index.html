<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Giriş - Zakher Travel</title>
  <link rel="icon" href="/favicon.ico?v=5" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=5">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=5">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png?v=5">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-page">
    <form id="login-form" class="login-card" autocomplete="off">
      <h1>Zakher Travel</h1>
      <p>Redaktə üçün daxil olun</p>
      <label>İstifadəçi adı</label>
      <input type="text" id="username" required autocomplete="off">
      <label>Şifrə</label>
      <input type="password" id="password" required autocomplete="off">
      <button type="submit">Daxil ol və redaktə et</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (isAuthenticated() && hasSaveToken()) location.href = '../?edit=1';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const r = await attemptLogin(username, password);
      if (r.ok) {
        const server = await serverLogin(username, password);
        if (!server.ok) {
          err.textContent = 'Server bağlantısı uğursuz. Yenidən cəhd edin.';
          return;
        }
        location.href = '../?edit=1';
      }
      else if (r.locked) err.textContent = `Bloklandı. ${r.remaining}s gözləyin.`;
      else err.textContent = `Yanlış giriş. ${r.attemptsLeft} cəhd qaldı.`;
    });
  </script>
  <script type="text/javascript">
    var sc_project = 13336756;
    var sc_invisible = 1;
    var sc_security = "465ec55b";
  </script>
  <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
  <noscript><div class="statcounter"><a title="Web Analytics" href="https://statcounter.com/" target="_blank"><img class="statcounter" src="https://c.statcounter.com/13336756/0/465ec55b/1/" alt="Web Analytics" referrerpolicy="no-referrer-when-downgrade"></a></div></noscript>
</body>
</html>
