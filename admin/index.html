<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Giriş - Zakher Travel</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-page">
    <form id="login-form" class="login-card" autocomplete="off">
      <h1>Zakher Travel</h1>
      <p>Redaktə üçün daxil olun</p>
      <label>İstifadəçi adı</label>
      <input type="text" id="username" required autocomplete="off">
      <label>Şifrə</label>
      <input type="password" id="password" required autocomplete="off">
      <button type="submit">Daxil ol və redaktə et</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (isAuthenticated()) location.href = '../?edit=1';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      const r = await attemptLogin(
        document.getElementById('username').value.trim(),
        document.getElementById('password').value
      );
      if (r.ok) {
        await serverLogin(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        ).catch(() => {});
        location.href = '../?edit=1';
      }
      else if (r.locked) err.textContent = `Bloklandı. ${r.remaining}s gözləyin.`;
      else err.textContent = `Yanlış giriş. ${r.attemptsLeft} cəhd qaldı.`;
    });
  </script>
</body>
</html>
