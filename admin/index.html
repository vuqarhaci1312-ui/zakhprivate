<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Panel - Zakher Travel</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div id="login-view" class="login-page">
    <div class="login-card">
      <div class="login-logo">ZT</div>
      <h1>Admin Panel</h1>
      <p class="login-desc">Zakher Travel saytını redaktə etmək üçün daxil olun</p>
      <form id="login-form" autocomplete="off">
        <div class="form-row">
          <label for="username">İstifadəçi adı</label>
          <input type="text" id="username" placeholder="username daxil edin" required autocomplete="off">
        </div>
        <div class="form-row">
          <label for="password">Şifrə</label>
          <input type="password" id="password" placeholder="şifrə daxil edin" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-login">Daxil ol</button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>
  </div>

  <div id="admin-panel" class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">ZT</span>
        <div>
          <strong>Zakher Travel</strong>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <button id="logout-btn" class="sidebar-logout">Çıxış</button>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <h1 id="page-title">Redaktə</h1>
          <p id="page-desc" class="topbar-desc">Sayt məzmununu buradan dəyişin</p>
        </div>
        <div class="topbar-actions">
          <button id="preview-btn" class="btn btn-outline">Sayta bax</button>
          <button id="save-btn" class="btn btn-green">Yadda saxla</button>
          <button id="export-btn" class="btn btn-outline">JSON yüklə</button>
          <button id="reset-btn" class="btn btn-red-outline">Sıfırla</button>
        </div>
      </header>

      <div id="editor" class="editor-area"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
