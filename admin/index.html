<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Panel - Zakher Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div id="login-view" class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <h1>Zakher Travel</h1>
        <p>Content Management System</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="username">İstifadəçi adı</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" placeholder="username" required autocomplete="off">
          </div>
        </div>
        <div class="input-group">
          <label for="password">Şifrə</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <span>Daxil ol</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>
  </div>

  <div id="admin-panel" class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-logo">ZT</div>
          <div>
            <strong>Zakher Travel</strong>
            <span>Admin Panel</span>
          </div>
        </div>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="nav-search" placeholder="Ölkə axtar...">
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-bottom">
        <button id="logout-btn" class="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Çıxış
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="breadcrumb" id="breadcrumb">Başlıq</div>
          <h1 id="page-title">Redaktə</h1>
          <p id="page-desc">Sayt məzmununu idarə edin</p>
        </div>
        <div class="topbar-right">
          <span id="save-status" class="save-status"></span>
          <button id="preview-btn" class="btn btn-ghost" title="Sayta bax">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Önizləmə
          </button>
          <button id="export-btn" class="btn btn-ghost" title="JSON yüklə">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <button id="reset-btn" class="btn btn-ghost btn-danger-text" title="Sıfırla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
            Sıfırla
          </button>
          <button id="save-btn" class="btn btn-save">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Yadda saxla
          </button>
        </div>
      </header>
      <div id="editor" class="content"></div>
    </main>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <h3 id="modal-title">Təsdiq</h3>
      <p id="modal-text"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Ləğv et</button>
        <button id="modal-confirm" class="btn btn-danger">Sil</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
