<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin - Zakher Travel</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div id="login-view" class="admin-login">
    <div class="login-box">
      <h1>Admin Panel</h1>
      <p>Zakher Travel idarəetmə</p>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary">Daxil ol</button>
        <p id="login-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <div id="admin-panel" class="admin-panel">
    <header class="admin-header">
      <h1>Content Editor</h1>
      <div class="header-actions">
        <button id="preview-btn" class="btn btn-secondary btn-sm">Önizləmə</button>
        <button id="save-btn" class="btn btn-success btn-sm">Yadda saxla</button>
        <button id="export-btn" class="btn btn-secondary btn-sm">Export JSON</button>
        <button id="reset-btn" class="btn btn-secondary btn-sm">Sıfırla</button>
        <button id="logout-btn" class="btn btn-danger btn-sm">Çıxış</button>
      </div>
    </header>
    <div id="editor" class="admin-content"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
